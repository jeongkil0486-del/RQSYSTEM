<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinity AirService</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════
     LOGIN PAGE
═══════════════════════════════════════════════ -->
<div class="login-page" id="loginArea">
    <!-- 배경 영상 (로그인 화면 전용) — 기존 그라디언트 배경 위에 표시되며,
         영상 로드 실패 시 .login-page 의 기존 배경(그라디언트)이 그대로
         보이는 자연스러운 fallback 이 된다. 기능/로그인 로직과 무관한
         순수 장식 레이어. -->
    <video class="login-bg-video" autoplay muted loop playsinline preload="auto">
        <source src="assets/login-bg.mp4" type="video/mp4">
    </video>
    <div class="login-bg-overlay"></div>

    <!-- 좌상단 고정 로고 (SONO TRINITY 스타일) — 모바일에서는 CSS로 숨기고
         기존처럼 카드 내부 로고(.login-logo-wrap)만 보이도록 처리 -->
    <div class="login-brand-corner">
        <svg viewBox="0 0 100 100" width="36" height="36">
            <path d="M 8,14 L 92,14 L 58,26 C 54,28.5 46,28.5 42,26 Z" fill="#cfd0d2"/>
            <path d="M 10,24 Q 22,31 35,33 C 43,33 46,50 48,90 Q 25,55 10,24" fill="#cf9388"/>
            <path d="M 90,24 Q 78,31 65,33 C 57,33 54,50 52,90 Q 75,55 90,24" fill="#d4c297"/>
        </svg>
        <span class="login-brand-corner-text">TRINITY AIR SERVICE</span>
    </div>

    <!-- 좌측 하단 로그인 영역 wrapper: 'Schedule Request System' 부제목
         (.login-sub, 기존 요소를 그대로 재사용 — 새로 만들지 않음)이
         가로형 로그인 바(.login-card) 바로 위에 오도록 세로로 묶는다. -->
    <div class="login-bottom-left">
        <div class="login-sub">Schedule Request System</div>

        <div class="login-card">
            <div class="login-logo-wrap">
                <svg viewBox="0 0 100 100" width="52" height="52">
                    <path d="M 8,14 L 92,14 L 58,26 C 54,28.5 46,28.5 42,26 Z" fill="#cfd0d2"/>
                    <path d="M 10,24 Q 22,31 35,33 C 43,33 46,50 48,90 Q 25,55 10,24" fill="#cf9388"/>
                    <path d="M 90,24 Q 78,31 65,33 C 57,33 54,50 52,90 Q 75,55 90,24" fill="#d4c297"/>
                </svg>
                <div class="login-brand">TRINITY AIR SERVICE</div>
            </div>

            <div class="input-group">
                <label for="username">사번</label>
                <input type="text" id="username" placeholder="사번을 입력하세요"
                       onkeydown="if(event.key==='Enter'){document.getElementById('password').focus();}">
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요"
                       onkeydown="if(event.key==='Enter'){checkAuth();}">
            </div>
            <button type="button" class="submit-btn" onclick="checkAuth()">로그인</button>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════
     APP SHELL (로그인 후 표시)
═══════════════════════════════════════════════ -->
<div id="appShell" style="display:none; flex-direction:column; min-height:100vh;">
